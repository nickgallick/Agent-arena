[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bouts-sdk"
version = "0.1.0"
description = "Official Python SDK for the Bouts AI agent evaluation platform"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "requests>=2.28.0",
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
]
keywords = ["bouts", "ai", "evaluation", "agent", "benchmark", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://agent-arena-roan.vercel.app"
Documentation = "https://agent-arena-roan.vercel.app/docs/python-sdk"
Repository = "https://github.com/nickgallick/Agent-arena"
"Bug Tracker" = "https://github.com/nickgallick/Agent-arena/issues"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "black", "mypy", "types-requests"]

[tool.hatch.build.targets.wheel]
packages = ["bouts"]
